<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>National Chamber of Exporters of Sri Lanka</title>
    <link rel="icon" type="image/jpeg" href="image/download.png">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary-blue: #001f3f;
            --gold-gradient: linear-gradient(45deg, #bf953f, #fcf6ba, #b38728, #fbf5b7, #aa771c);
            --gold-solid: #d4af37;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            font-family: 'Poppins', sans-serif;
            background-color: #000;
            overflow: hidden;
        }

        /* Background */
        .bg-container {
            position: fixed;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at center, #001f3f 0%, #000 100%);
            z-index: -1;
        }

        /* Page Layouts */
        #launch-page, #text-page {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            text-align: center;
            transition: opacity 1s ease-in-out;
            position: absolute;
            width: 100%;
            top: 0;
            left: 0;
        }

        /* --- Page 1 Style --- */
        .nce-logo-text {
            font-family: 'Cinzel', serif;
            color: white;
            letter-spacing: 5px;
            margin-bottom: 50px;
            animation: fadeInDown 1.5s ease;
        }

        .nce-logo-text h1 { font-size: 2.5rem; margin: 0; }
        .nce-logo-text p { color: var(--gold-solid); font-size: 1rem; margin-top: 5px; }

        .launch-btn {
            padding: 20px 60px;
            font-size: 30px;
            font-family: 'Cinzel', serif;
            font-weight: bold;
            color: var(--gold-solid);
            background: transparent;
            border: 2px solid var(--gold-solid);
            border-radius: 50px;
            cursor: pointer;
            transition: 0.5s;
            box-shadow: 0 0 15px rgba(212, 175, 55, 0.2);
        }

        .launch-btn:hover {
            color: #000;
            background: var(--gold-gradient);
            box-shadow: 0 0 40px rgba(212, 175, 55, 0.6);
            transform: scale(1.05);
        }

        /* --- Page 2 Style (The Text Page) --- */
        #text-page {
            display: none;
            opacity: 0;
        }

        .main-announcement {
            font-family: 'Cinzel', serif;
            background: var(--gold-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-size: 4rem; /* Lokuwata text eka enna */
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 4px;
            padding: 20px;
            line-height: 1.2;
            animation: textGlow 2s infinite alternate;
        }

        .sub-text {
            color: white;
            font-size: 1.2rem;
            margin-top: 20px;
            letter-spacing: 8px;
            opacity: 0.7;
            text-transform: uppercase;
        }

        /* Animations */
        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes textGlow {
            from { filter: drop-shadow(0 0 10px rgba(212, 175, 55, 0.2)); }
            to { filter: drop-shadow(0 0 30px rgba(212, 175, 55, 0.5)); }
        }

        .hidden { display: none !important; }
        .show { display: flex !important; opacity: 1 !important; }

    </style>
</head>
<body>

<div class="bg-container"></div>

<div id="launch-page">
    <div class="nce-logo-text">
        <h1>The National Chamber of Exporters</h1>
        <p>SRI LANKA</p>
    </div>

    <button class="launch-btn" onclick="showText()">LAUNCH</button>

    <p style="color: #555; margin-top: 40px; letter-spacing: 2px; font-weight: 300;">PROUDLY PRESENTING THE FUTURE</p>
</div>

<div id="text-page">
    <div class="main-announcement">
        Release our <br> Corporate Video
    </div>
    <div class="sub-text">The National Chamber of Exporters</div>

<!--    <button onclick="location.reload()" style="margin-top: 60px; background: none; border: 1px solid #333; color: #444; padding: 10px 20px; border-radius: 5px; cursor: pointer;">Reset</button>-->
</div>

<script>
    function showText() {
        const lp = document.getElementById('launch-page');
        const tp = document.getElementById('text-page');

        // Fade out 1st page
        lp.style.opacity = '0';

        setTimeout(() => {
            lp.classList.add('hidden');
            tp.classList.add('show');
        }, 1000);
    }
</script>

</body>
</html>
