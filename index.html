<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>National Chamber of Exporters of Sri Lanka</title>
    <link rel="icon" type="image/jpeg" href="image/download.png">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary-blue: #001f3f;
            --gold-gradient: linear-gradient(45deg, #bf953f, #fcf6ba, #b38728, #fbf5b7, #aa771c);
            --gold-solid: #d4af37;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            font-family: 'Poppins', sans-serif;
            background-color: #000;
            overflow: hidden;
        }

        .bg-container {
            position: fixed;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at center, #001f3f 0%, #000 100%);
            z-index: -1;
        }

        .page-content {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            text-align: center;
            position: absolute;
            width: 100%;
            transition: opacity 0.8s ease-in-out;
        }

        /* --- Launch Page --- */
        .nce-logo-text {
            font-family: 'Cinzel', serif;
            color: white;
            letter-spacing: 5px;
            margin-bottom: 50px;
            animation: fadeInDown 1.5s ease;
        }

        .nce-logo-text h1 { font-size: 2.5rem; margin: 0; }
        .nce-logo-text p { color: var(--gold-solid); font-size: 1rem; margin-top: 5px; }

        .launch-btn {
            padding: 20px 60px;
            font-size: 50px;
            font-family: 'Cinzel', serif;
            font-weight: bold;
            color: var(--gold-solid);
            background: transparent;
            border: 2px solid var(--gold-solid);
            border-radius: 50px;
            cursor: pointer;
            transition: 0.5s;
            box-shadow: 0 0 15px rgba(212, 175, 55, 0.2);
        }

        .launch-btn:hover {
            color: #000;
            background: var(--gold-gradient);
            box-shadow: 0 0 40px rgba(212, 175, 55, 0.6);
            transform: scale(1.05);
        }

        /* --- Loading Section --- */
        #loading-screen {
            display: none;
            opacity: 0;
        }

        .loader {
            width: 80px;
            height: 80px;
            border: 4px solid rgba(212, 175, 55, 0.1);
            border-left-color: var(--gold-solid);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.2);
        }

        .loading-text {
            color: var(--gold-solid);
            font-family: 'Cinzel', serif;
            font-size: 1.5rem;
            letter-spacing: 4px;
            text-transform: uppercase;
            animation: pulse 1.5s infinite;
        }

        /* --- Final Text Page --- */
        #text-page {
            display: none;
            opacity: 0;
        }

        .main-announcement {
            font-family: 'Cinzel', serif;
            background: var(--gold-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-size: 4rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 4px;
            line-height: 1.2;
            animation: textGlow 2s infinite alternate;
        }

        /* Animations */
        @keyframes spin { to { transform: rotate(360deg); } }
        @keyframes pulse { 0%, 100% { opacity: 0.5; } 50% { opacity: 1; } }
        @keyframes fadeInDown { from { opacity: 0; transform: translateY(-30px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes textGlow { from { filter: drop-shadow(0 0 10px rgba(212, 175, 55, 0.2)); } to { filter: drop-shadow(0 0 30px rgba(212, 175, 55, 0.5)); } }

        .hidden { display: none !important; }
        .show { display: flex !important; opacity: 1 !important; }

    </style>
</head>
<body>

<div class="bg-container"></div>

<div id="launch-page" class="page-content">
    <div class="nce-logo-text">
        <h1>The National Chamber of Exporters</h1>
        <p>SRI LANKA</p>
    </div>
    <button class="launch-btn" onclick="startProcess()">LAUNCH</button>
    <p style="color: #555; margin-top: 40px; letter-spacing: 2px; font-weight: 300;">PROUDLY PRESENTING THE FUTURE</p>
</div>

<div id="loading-screen" class="page-content">
    <div class="loader"></div>
    <div class="loading-text">Loading...</div>
</div>

<script>
    function startProcess() {
        const lp = document.getElementById('launch-page');
        const ls = document.getElementById('loading-screen');
        const tp = document.getElementById('text-page');

        // 1. Launch Page eka fade out karanawa
        lp.style.opacity = '0';

        setTimeout(() => {
            lp.classList.add('hidden');

            // 2. Loading Screen eka pennanawa
            ls.classList.add('show');

            // 3. Thappara 2.5 kata passe final text ekata yanawa
            setTimeout(() => {
                ls.style.opacity = '0';

                setTimeout(() => {
                    ls.classList.remove('show');
                    ls.classList.add('hidden');

                    // 4. Final Text Page eka pennanawa
                    tp.classList.add('show');
                }, 800);

            }, 2500); // Loading thiyena welawa (millisecond 2500 = thappara 2.5)

        }, 800);
    }
</script>

</body>
</html>
